<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  
    {% if page.tags %}
    <meta name="keywords" content="{{ page.tags | join: ', ' | escape }}" />
    {% elsif page.keywords %}
    <meta name="keywords" content="{{ page.keywords | split: ' ' | join: ', ' | escape }}" />
    {% elsif site.keywords %}
    <meta name="keywords" content="{{ site.keywords | split: ' ' | join: ', ' | escape }}" />
    {% endif %}

    <meta name="HandheldFriendly" content="True">
    <meta name="robots" content="index,follow">
    <meta name="googlebot" content="index,follow">
    <meta name="google-site-verification" content="dHAOtKKav62G0D8KmC4_j3ZmABaYhXkk92frciO2G98" />

    <link rel="shortcut icon" href="{{ site.github.url }}/assets/favicon.ico" />
    
    {% include ogp.html %} 

    {% if jekyll.environment == 'production' %}
    {% include lib/analytics.html %}
    {% endif %} 

    <link href='https://fonts.googleapis.com/css?family=Mrs+Saint+Delafield|Merriweather:300italic,700,300,700italic|Open+Sans:400,700' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="{{ "/css/screen.css" | prepend: site.github.url | prepend: site.baseurl }}">
    <link rel="stylesheet" href="{{ "/css/prism.css" | prepend: site.github.url | prepend: site.baseurl}}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.github.url | prepend: site.baseurl }}">
    <link href='https://fonts.googleapis.com/css?family=Great+Vibes' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/css?family=Titillium+Web" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Iceland" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Anonymous+Pro" rel="stylesheet">


    <style>
        #disqus_thread {
            max-width: 920px;
       }

        .site-wrapper {
          max-width: 1024px;
          margin: auto;
        }
    </style>




</head>
