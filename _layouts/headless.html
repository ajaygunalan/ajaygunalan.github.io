<!DOCTYPE html>
<html lang="{% if page.language %}{{ page.language | downcase }}{% else %}{{ site.language | downcase }}{% endif %}">
{% include main.html %}

<section class="author-profile" itemprop="author" itemscope itemtype="http://schema.org/Person">
    {%  if author.cover %}
    <div class="author-cover image-bg" style="background-image: url('{{author.cover | prepend: site.github.url | prepend: site.baseurl}}')"></div>
    {% endif %}

    {%  if author.picture %}
    <figure class="author-image  {%  if author.cover %} has-cover  {% endif %}">
        <div class="img image-bg" style="background-image: url({{author.picture | prepend: site.github.url | prepend: site.baseurl}})">
            <a class="hidden" href="{{author.picture | prepend: site.github.url | prepend: site.baseurl}}" itemprop="image">{{author.name}}'s Picture</a>
        </div>
    </figure>
    {% endif %}

   <!-- a84b4b 

    <div class="author-info">
        <!-- <h1 class="author-title" itemprop="name" style="color: #000000;">{{author.name}}  </h1>
        <h2 class="author-bio" itemprop="description" style="color: #000000;" style="text-align: center;">{{author.bio}}</h2> 
        <p class="author-quote" itemprop="quote">{{author.quote}}</p> -->

        <p style="text-align: center;" class="author-contact" >
        <a href="mailto:ajay.gunalan@pm.me" class="author-email" itemprop="contact" style="color: #566573;" style="text-align: center;">{{author.email}}</a>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <a href="tel:+393203496112" class="author-phone" itemprop="contact" style="color: #566573;" style="text-align: center;">{{author.phone}}</a>
        </p>

        <div class="author-meta" style="color:#000000;">

            <a href="{{ site.github.url }}/" class="main-link">
            About</a>

            <a href="{{ site.github.url }}/research.html" class="main-link">
            Research</a>

            <a href="https://github.com/{{ author.github }}" class="main-link">
            GitHub</a>

            <a href="{{ site.github.url }}/assets/ajayg_cv.pdf" class="main-link">
            CV</a>

            <a href="{{ site.github.url }}/blog.html" class="main-link">
            Blog</a>
    
        </div>

        <style>

            h1.author-title {
                /*font-family: 'Anonymous+Pro';*/
                font-family: 'Iceland', cursive;
                font-weight: lighter;
                color:#000000;

            }

            h2.author-bio {
                font-family: 'Iceland', cursive;
                color:#000000;
            }

            p.author-quote {
                /*font: 400 30px/1.3 'Great Vibes', Helvetica, sans-serif;*/
                font-family: 'Iceland', cursive;
                /*font-family: 'Great Vibes', Helvetica, sans-serif;*/
                font-size: 20px;
                /*color: #CD5C5C; Indian Red*/
                /*color: #4364D5; Krishna Blue*/
                color:#000000;
                /*color: #000000; /* Black */
                text-shadow: 4px 4px 3px rgba(0,0,0,0.1); 
                text-align: center;  
            }

            p.author-contact {
                font-family: 'Iceland', cursive;
                font-style: 25px;
                text-align: center;
                color:#000000;

            }

        </style>

    </div>



</section>   

<body class="home-template">
    <div class="site-wrapper">
        {{ content }}
    
    </div>
</body>


<script src="{{ site.github.url | prepend: site.baseurl}}/js/global.js"></script>
</html>
